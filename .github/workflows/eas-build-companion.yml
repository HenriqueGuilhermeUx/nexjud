name: Build NexJud Companion

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Tipo de build"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

jobs:
  build-android:
    name: Build Android (${{ inputs.profile }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Build Android on EAS
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive --no-wait
